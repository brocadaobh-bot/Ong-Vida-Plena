# Supabase local development configuration
# Run `supabase init` then paste this content into supabase/config.toml

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3001"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/confirm",
  "http://localhost:3000/redefinir-senha",
  "http://localhost:3001/auth/callback",
  "http://localhost:3001/auth/confirm",
  "http://localhost:3001/redefinir-senha",
  "http://127.0.0.1:3000/auth/callback",
  "http://127.0.0.1:3001/auth/callback",
  "http://127.0.0.1:3001/auth/confirm",
  "http://127.0.0.1:3001/redefinir-senha",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.recovery]
subject = "ONG Vida Plena — Redefina sua senha com segurança"
content_path = "./supabase/templates/recovery.html"

[auth.sms]
enable_signup = false
